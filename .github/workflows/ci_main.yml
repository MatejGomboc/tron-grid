name: CI - Main Branch

permissions:
    contents: read
    actions: write

on:
    push:
        branches: [main]

    workflow_dispatch:

env:
    VULKAN_SDK_VERSION: "1.4.335.0"

jobs:
    quick-checks:
        name: Quick Checks (markdown)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              id: setup-node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                node-version: "lts/*"

            - name: Get markdownlint-cli2 version
              id: mdlint-version
              run: echo "version=$(npm view markdownlint-cli2 version)" >> "$GITHUB_OUTPUT"

            - name: Restore npm cache
              id: npm-cache-restore
              uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                path: ~/.npm
                key: npm-markdownlint-${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-mdlint-${{ steps.mdlint-version.outputs.version }}

            - name: Install markdownlint-cli2
              run: npm install -g markdownlint-cli2

            - name: Lint markdown
              run: markdownlint-cli2 "**/*.md"

            - name: Save npm cache
              if: steps.npm-cache-restore.outputs.cache-hit != 'true'
              uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                path: ~/.npm
                key: npm-markdownlint-${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-mdlint-${{ steps.mdlint-version.outputs.version }}

    build:
        name: Build (${{ matrix.preset }})
        needs: quick-checks
        timeout-minutes: 30

        strategy:
            fail-fast: false
            max-parallel: 20

            matrix:
                include:
                    - preset: windows-msvc
                      os: windows-latest
                      msvc-setup-needed: true
                    - preset: windows-clang-cl
                      os: windows-latest
                    - preset: windows-mingw
                      os: windows-latest
                    - preset: linux-x11-gcc
                      os: ubuntu-latest
                    - preset: linux-x11-clang
                      os: ubuntu-latest

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install XCB development headers (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install -y libxcb1-dev

            - name: Setup Vulkan SDK (Windows)
              if: runner.os == 'Windows'
              uses: ./.github/actions/setup-vulkan-windows
              with:
                version: ${{ env.VULKAN_SDK_VERSION }}

            - name: Setup Vulkan SDK (Linux)
              if: runner.os == 'Linux'
              uses: ./.github/actions/setup-vulkan-linux
              with:
                version: ${{ env.VULKAN_SDK_VERSION }}

            - name: Setup MSVC environment
              if: matrix.msvc-setup-needed
              uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

            - name: Run CMake workflow
              run: cmake --workflow --preset=${{ matrix.preset }}

    sanitisers:
        name: Sanitiser (${{ matrix.name }})
        needs: quick-checks
        timeout-minutes: 30

        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: ASan+UBSan
                      preset: linux-x11-clang-asan
                    - name: TSan
                      preset: linux-x11-clang-tsan
                      # logger_tests hangs under TSan due to glibc false positive
                      # (tpp.c:83 __pthread_tpp_change_priority assertion).
                      # Exclude it — logger thread safety is validated by ASan.
                      test_exclude: logger_tests

        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install XCB development headers
              run: sudo apt-get update && sudo apt-get install -y libxcb1-dev

            - name: Setup Vulkan SDK
              uses: ./.github/actions/setup-vulkan-linux
              with:
                version: ${{ env.VULKAN_SDK_VERSION }}

            - name: Configure
              run: cmake --preset=${{ matrix.preset }}

            - name: Build (Debug)
              run: cmake --build --preset=${{ matrix.preset }}-debug

            - name: Test (Debug)
              env:
                TSAN_OPTIONS: "suppressions=${{ github.workspace }}/tsan_suppressions.txt"
              run: >
                ctest --preset=${{ matrix.preset }}-debug
                ${{ matrix.test_exclude && format('--exclude-regex {0}', matrix.test_exclude) || '' }}

    ci-success:
        name: CI Success
        needs: [quick-checks, build, sanitisers]
        runs-on: ubuntu-latest
        if: always()

        steps:
            - name: Check if all jobs succeeded
              id: check-results
              run: |
                if [[ "${{ needs.quick-checks.result }}" != "success" ]] || \
                   [[ "${{ needs.build.result }}" != "success" ]] || \
                   [[ "${{ needs.sanitisers.result }}" != "success" ]]; then
                    echo "One or more jobs failed"
                    exit 1
                fi
                echo "All jobs completed successfully"

            - name: Checkout repository
              if: success()
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Cleanup stale caches
              if: success()
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                script: |
                    const owner = context.repo.owner;
                    const repo = context.repo.repo;

                    const response = await github.rest.actions.getActionsCacheList({
                        owner,
                        repo,
                        per_page: 100,
                        sort: 'last_accessed_at',
                        direction: 'desc',
                    });

                    const caches = response.data.actions_caches;
                    if (caches.length === 0) {
                        core.info('No caches found');
                        return;
                    }

                    // Group caches by type and OS
                    const cacheGroups = {};
                    for (const cache of caches) {
                        let prefix;
                        if (cache.key.startsWith('npm-markdownlint-')) {
                            const parts = cache.key.split('-');
                            prefix = `${parts[0]}-${parts[1]}-${parts[2]}`;
                        } else if (cache.key.startsWith('vulkan-')) {
                            const parts = cache.key.split('-');
                            prefix = `${parts[0]}-${parts[1]}-${parts[2]}`;
                        } else {
                            prefix = cache.key;
                        }

                        if (!cacheGroups[prefix]) {
                            cacheGroups[prefix] = [];
                        }
                        cacheGroups[prefix].push(cache);
                    }

                    // For each group, keep only the most recently accessed cache
                    let deletedCount = 0;
                    let freedBytes = 0;

                    for (const [prefix, groupCaches] of Object.entries(cacheGroups)) {
                        groupCaches.sort((a, b) =>
                            new Date(b.last_accessed_at) - new Date(a.last_accessed_at)
                        );

                        for (let i = 1; i < groupCaches.length; i++) {
                            const cache = groupCaches[i];
                            try {
                                await github.rest.actions.deleteActionsCacheById({
                                    owner,
                                    repo,
                                    cache_id: cache.id,
                                });
                                core.info(`Deleted stale cache: ${cache.key}`);
                                deletedCount++;
                                freedBytes += cache.size_in_bytes;
                            } catch (error) {
                                core.warning(`Failed to delete cache ${cache.key}: ${error.message}`);
                            }
                        }
                    }

                    const freedMB = (freedBytes / (1024 * 1024)).toFixed(2);
                    core.info(`Cleanup complete: deleted ${deletedCount} stale cache(s), freed ${freedMB} MB`);
