name: CI - Pull Request

permissions:
    contents: read

on:
    pull_request:
        branches: ["**"]

env:
    VULKAN_SDK_VERSION: "1.4.335.0"

jobs:
    quick-checks:
        name: Quick Checks (markdown)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              id: setup-node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                node-version: "lts/*"

            - name: Get markdownlint-cli2 version
              id: mdlint-version
              run: echo "version=$(npm view markdownlint-cli2 version)" >> "$GITHUB_OUTPUT"

            # Restore cache from main branch (read-only)
            - name: Restore npm cache
              uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
              with:
                path: ~/.npm
                key: npm-markdownlint-${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-mdlint-${{ steps.mdlint-version.outputs.version }}

            - name: Install markdownlint-cli2
              run: npm install -g markdownlint-cli2

            - name: Lint markdown
              run: markdownlint-cli2 "**/*.md"

    build:
        name: Build (${{ matrix.preset }})
        needs: quick-checks
        timeout-minutes: 30

        strategy:
            fail-fast: false
            max-parallel: 20

            matrix:
                include:
                    - preset: windows-msvc
                      os: windows-latest
                      msvc-setup-needed: true
                    - preset: windows-clang-cl
                      os: windows-latest
                    - preset: windows-mingw
                      os: windows-latest
                    - preset: linux-x11-gcc
                      os: ubuntu-latest
                    - preset: linux-x11-clang
                      os: ubuntu-latest

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install X11 development headers (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install -y libx11-dev

            - name: Setup Vulkan SDK (Windows)
              if: runner.os == 'Windows'
              uses: ./.github/actions/setup-vulkan-windows
              with:
                version: ${{ env.VULKAN_SDK_VERSION }}

            - name: Setup Vulkan SDK (Linux)
              if: runner.os == 'Linux'
              uses: ./.github/actions/setup-vulkan-linux
              with:
                version: ${{ env.VULKAN_SDK_VERSION }}

            - name: Setup MSVC environment
              if: matrix.msvc-setup-needed
              uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

            - name: Run CMake workflow
              run: cmake --workflow --preset=${{ matrix.preset }}

    ci-success:
        name: CI Success
        needs: [quick-checks, build]
        runs-on: ubuntu-latest
        if: always()

        steps:
            - name: Check if all jobs succeeded
              run: |
                if [[ "${{ needs.quick-checks.result }}" != "success" ]] || \
                   [[ "${{ needs.build.result }}" != "success" ]]; then
                    echo "One or more jobs failed"
                    exit 1
                fi
                echo "All jobs completed successfully"
