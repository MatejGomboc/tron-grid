name: CI

permissions:
    contents: read

on:
    push:
        branches: [main] # Populate cache on main after PR merges.

    pull_request:
        branches: ["**"] # Run validation on any PR.

    workflow_dispatch: # Manual trigger option.

env:
    VULKAN_SDK_VERSION: "1.4.335.0"

jobs:
    build:
        timeout-minutes: 30

        strategy:
            fail-fast: false # Don't cancel other jobs if one fails.

            max-parallel: 20 # Use maximum possible parallelisation.

            matrix:
                include:
                    - preset: windows-msvc
                      os: windows-latest
                      msvc-setup-needed: true
                    - preset: windows-clang-cl
                      os: windows-latest
                    - preset: windows-mingw
                      os: windows-latest
                    - preset: linux-x11-gcc
                      os: ubuntu-latest
                    - preset: linux-x11-clang
                      os: ubuntu-latest

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout Github repository
              uses: actions/checkout@v6

            - name: Install X11 development headers (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install -y libx11-dev

            - name: Setup Vulkan SDK (Windows)
              if: runner.os == 'Windows'
              uses: ./.github/actions/setup-vulkan-windows
              with:
                version: ${{ env.VULKAN_SDK_VERSION }}

            - name: Setup Vulkan SDK (Linux)
              if: runner.os == 'Linux'
              uses: ./.github/actions/setup-vulkan-linux
              with:
                version: ${{ env.VULKAN_SDK_VERSION }}

            - name: Setup MSVC environment
              if: matrix.msvc-setup-needed
              uses: ilammy/msvc-dev-cmd@v1

            - name: Run CMake workflow
              run: cmake --workflow --preset=${{ matrix.preset }}

    build_summary:
        needs: build

        runs-on: ubuntu-latest

        if: always() # Run even if some matrix jobs failed.

        steps:
            - name: Check if all jobs succeeded
              run: |
                  if [[ "${{ needs.build.result }}" != "success" ]]; then
                      echo "One or more jobs failed"
                      exit 1
                  fi
                  echo "All jobs completed successfully"
